<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚾ Game Replay - Spoiler-Free Experience</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(217, 119, 6, 0.5); }
      50% { box-shadow: 0 0 20px rgba(217, 119, 6, 0.8); }
    }
    .winning-glow { animation: pulse-glow 2s ease-in-out infinite; }

    @keyframes flip-down {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }
    .flip-animate { animation: flip-down 0.3s ease-in-out; }

    .scoreboard-digit {
      background: linear-gradient(180deg, #1f1f1f 0%, #0a0a0a 50%, #1a1a1a 50%, #0f0f0f 100%);
      border: 1px solid #333;
      position: relative;
    }
    .scoreboard-digit::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #222;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* Celebration animations */
    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      15% { transform: translateY(-8px) rotate(-3deg) scale(1.02); }
      30% { transform: translateY(0) rotate(3deg) scale(1); }
      45% { transform: translateY(-6px) rotate(-2deg) scale(1.01); }
      60% { transform: translateY(0) rotate(2deg) scale(1); }
      75% { transform: translateY(-4px) rotate(-1deg) scale(1.01); }
      90% { transform: translateY(0) rotate(1deg) scale(1); }
    }
    .dance-celebrate {
      animation: dance 0.8s ease-in-out;
    }

    @keyframes firework-burst {
      0% { transform: scale(0); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    @keyframes firework-particle {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes score-flash {
      0%, 100% { color: inherit; }
      25% { color: #fbbf24; text-shadow: 0 0 10px #fbbf24; }
      50% { color: #f59e0b; text-shadow: 0 0 15px #f59e0b; }
      75% { color: #fbbf24; text-shadow: 0 0 10px #fbbf24; }
    }
    .score-celebrate {
      animation: score-flash 0.5s ease-in-out 3;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
  </style>
</head>
<body class="bg-gray-950">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // Fireworks celebration component
    const Fireworks = ({ active, duration = 2000 }) => {
      const [particles, setParticles] = useState([]);
      const [sparkles, setSparkles] = useState([]);
      const [show, setShow] = useState(false);
      const activeRef = useRef(false);

      useEffect(() => {
        // Only trigger on rising edge (false -> true)
        if (active && !activeRef.current) {
          activeRef.current = true;
          setShow(true);

          // Create particles once
          const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b9d', '#c44dff', '#ff8c42'];
          const newParticles = [];
          const numBursts = 3 + Math.floor(Math.random() * 3);

          for (let burst = 0; burst < numBursts; burst++) {
            const centerX = 20 + Math.random() * 60;
            const centerY = 20 + Math.random() * 40;
            const numParticles = 12 + Math.floor(Math.random() * 8);
            const burstDelay = burst * 200;

            for (let i = 0; i < numParticles; i++) {
              const angle = (i / numParticles) * Math.PI * 2;
              const velocity = 50 + Math.random() * 50;
              newParticles.push({
                id: `${burst}-${i}`,
                x: centerX,
                y: centerY,
                dx: Math.cos(angle) * velocity,
                dy: Math.sin(angle) * velocity,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: 3 + Math.random() * 4,
                delay: burstDelay,
                animDuration: 800 + Math.random() * 400,
              });
            }
          }
          setParticles(newParticles);

          // Create sparkles once with fixed positions
          const emojiOptions = ['✨', '🎆', '⭐', '💥', '🌟'];
          const newSparkles = [...Array(8)].map((_, i) => ({
            id: i,
            left: 15 + Math.random() * 70,
            top: 10 + Math.random() * 50,
            emoji: emojiOptions[Math.floor(Math.random() * emojiOptions.length)],
            animDuration: 600 + Math.random() * 400,
            delay: i * 150,
          }));
          setSparkles(newSparkles);

          // Clean up after duration
          const timer = setTimeout(() => {
            setShow(false);
            setParticles([]);
            setSparkles([]);
            activeRef.current = false;
          }, duration);

          return () => clearTimeout(timer);
        } else if (!active) {
          activeRef.current = false;
        }
      }, [active, duration]);

      if (!show) return null;

      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden z-50">
          {particles.map(p => (
            <div
              key={p.id}
              className="absolute rounded-full"
              style={{
                left: `${p.x}%`,
                top: `${p.y}%`,
                width: p.size,
                height: p.size,
                backgroundColor: p.color,
                boxShadow: `0 0 ${p.size * 2}px ${p.color}`,
                animation: `firework-particle ${p.animDuration}ms ease-out ${p.delay}ms forwards`,
                transform: `translate(${p.dx}px, ${p.dy}px)`,
              }}
            />
          ))}
          {sparkles.map(s => (
            <div
              key={`sparkle-${s.id}`}
              className="absolute text-2xl"
              style={{
                left: `${s.left}%`,
                top: `${s.top}%`,
                animation: `sparkle ${s.animDuration}ms ease-out ${s.delay}ms forwards`,
              }}
            >
              {s.emoji}
            </div>
          ))}
        </div>
      );
    };

    // MLB Teams data
    const MLB_TEAMS = {
      108: { name: "Angels", abbreviation: "LAA", color: "#BA0021" },
      109: { name: "Diamondbacks", abbreviation: "ARI", color: "#A71930" },
      110: { name: "Orioles", abbreviation: "BAL", color: "#DF4601" },
      111: { name: "Red Sox", abbreviation: "BOS", color: "#BD3039" },
      112: { name: "Cubs", abbreviation: "CHC", color: "#0E3386" },
      113: { name: "Reds", abbreviation: "CIN", color: "#C6011F" },
      114: { name: "Guardians", abbreviation: "CLE", color: "#00385D" },
      115: { name: "Rockies", abbreviation: "COL", color: "#333366" },
      116: { name: "Tigers", abbreviation: "DET", color: "#0C2340" },
      117: { name: "Astros", abbreviation: "HOU", color: "#002D62" },
      118: { name: "Royals", abbreviation: "KC", color: "#004687" },
      119: { name: "Dodgers", abbreviation: "LAD", color: "#005A9C" },
      120: { name: "Nationals", abbreviation: "WSH", color: "#AB0003" },
      121: { name: "Mets", abbreviation: "NYM", color: "#002D72" },
      133: { name: "Athletics", abbreviation: "OAK", color: "#003831" },
      134: { name: "Pirates", abbreviation: "PIT", color: "#27251F" },
      135: { name: "Padres", abbreviation: "SD", color: "#2F241D" },
      136: { name: "Mariners", abbreviation: "SEA", color: "#0C2C56" },
      137: { name: "Giants", abbreviation: "SF", color: "#FD5A1E" },
      138: { name: "Cardinals", abbreviation: "STL", color: "#C41E3A" },
      139: { name: "Rays", abbreviation: "TB", color: "#092C5C" },
      140: { name: "Rangers", abbreviation: "TEX", color: "#003278" },
      141: { name: "Blue Jays", abbreviation: "TOR", color: "#134A8E" },
      142: { name: "Twins", abbreviation: "MIN", color: "#002B5C" },
      143: { name: "Phillies", abbreviation: "PHI", color: "#E81828" },
      144: { name: "Braves", abbreviation: "ATL", color: "#CE1141" },
      145: { name: "White Sox", abbreviation: "CWS", color: "#27251F" },
      146: { name: "Marlins", abbreviation: "MIA", color: "#00A3E0" },
      147: { name: "Yankees", abbreviation: "NYY", color: "#003087" },
      158: { name: "Brewers", abbreviation: "MIL", color: "#12284B" }
    };

    // Curated list of exciting real MLB games - high-scoring, comebacks, walk-offs
    const EXCITING_GAMES = [
      // 2024 Season highlights
      { gamePk: 745546, desc: "Rangers vs Astros - High-scoring thriller" },
      { gamePk: 746273, desc: "Dodgers vs Padres - NL West rivalry" },
      { gamePk: 745986, desc: "Yankees vs Red Sox - Classic rivalry" },
      { gamePk: 747165, desc: "Braves vs Phillies - NL East battle" },
      { gamePk: 746891, desc: "Cubs vs Cardinals - Historic rivalry" },

      // 2023 Season highlights
      { gamePk: 717465, desc: "Rangers vs Diamondbacks - World Series Game 5" },
      { gamePk: 716463, desc: "Phillies vs Diamondbacks - NLCS Game 7" },
      { gamePk: 715752, desc: "Astros vs Rangers - ALCS thriller" },
      { gamePk: 718782, desc: "Dodgers vs Padres - September showdown" },
      { gamePk: 716439, desc: "Braves vs Phillies - Playoff drama" },

      // 2022 Exciting games
      { gamePk: 663341, desc: "Phillies vs Astros - World Series Game 5" },
      { gamePk: 662614, desc: "Padres vs Phillies - NLCS Game 5" },
      { gamePk: 661527, desc: "Mariners vs Astros - ALDS thriller" },
      { gamePk: 662419, desc: "Yankees vs Guardians - ALDS Game 5" },
      { gamePk: 661578, desc: "Cardinals vs Phillies - Wild Card" },

      // Regular season high-scoring games
      { gamePk: 718892, desc: "High-scoring slugfest 2023" },
      { gamePk: 716745, desc: "Comeback victory 2023" },
      { gamePk: 745873, desc: "Extra innings thriller 2024" },
      { gamePk: 746112, desc: "Late-inning drama 2024" },
      { gamePk: 663098, desc: "Walk-off classic 2022" },
    ];

    // Function to fetch and load a random exciting game
    const fetchRandomExcitingGame = async () => {
      // Shuffle and try games until one works
      const shuffled = [...EXCITING_GAMES].sort(() => Math.random() - 0.5);

      for (const game of shuffled) {
        try {
          const [linescoreRes, playsRes] = await Promise.all([
            fetch(`https://statsapi.mlb.com/api/v1.1/game/${game.gamePk}/feed/live`),
            fetch(`https://statsapi.mlb.com/api/v1/game/${game.gamePk}/playByPlay`)
          ]);

          if (!linescoreRes.ok || !playsRes.ok) continue;

          const linescoreData = await linescoreRes.json();
          const playsData = await playsRes.json();

          // parseGameData is defined below, we'll call it from the component
          return { linescore: linescoreData, plays: playsData, gamePk: game.gamePk, desc: game.desc };
        } catch (error) {
          console.log(`Failed to fetch game ${game.gamePk}, trying next...`);
          continue;
        }
      }
      return null;
    };

    // API Functions
    const fetchGamesForDate = async (date) => {
      try {
        const response = await fetch(
          `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=linescore,team`
        );
        const data = await response.json();
        return data.dates?.[0]?.games || [];
      } catch (error) {
        console.error('Error fetching games:', error);
        return [];
      }
    };

    const fetchGameDetails = async (gamePk) => {
      try {
        const [linescoreRes, playsRes] = await Promise.all([
          fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`),
          fetch(`https://statsapi.mlb.com/api/v1/game/${gamePk}/playByPlay`)
        ]);
        const linescoreData = await linescoreRes.json();
        const playsData = await playsRes.json();
        return { linescore: linescoreData, plays: playsData };
      } catch (error) {
        console.error('Error fetching game details:', error);
        return null;
      }
    };

    const parseGameData = (gameData, playsData) => {
      const game = gameData.gameData;
      const linescore = gameData.liveData?.linescore;
      if (!game || !linescore) return null;

      const homeTeamId = game.teams.home.id;
      const awayTeamId = game.teams.away.id;

      const homeTeamInfo = MLB_TEAMS[homeTeamId] || {
        name: game.teams.home.name,
        abbreviation: game.teams.home.abbreviation,
        color: "#333333"
      };
      const awayTeamInfo = MLB_TEAMS[awayTeamId] || {
        name: game.teams.away.name,
        abbreviation: game.teams.away.abbreviation,
        color: "#666666"
      };

      // Build half-innings array
      const halfInnings = [];
      linescore.innings?.forEach(inning => {
        halfInnings.push({ inning: inning.num, isTop: true, runs: inning.away?.runs || 0 });
        // Only add bottom if it was played
        if (inning.home?.runs !== undefined) {
          halfInnings.push({ inning: inning.num, isTop: false, runs: inning.home?.runs || 0 });
        }
      });

      // Parse ALL plays with outs, base runners, and pitches
      const plays = [];
      const pitches = [];
      let currentAwayScore = 0;
      let currentHomeScore = 0;
      let playIndex = 0;

      // Track base state cumulatively (resets each half-inning)
      let currentBases = { first: false, second: false, third: false };
      let lastHalfInning = null;

      if (playsData?.allPlays) {
        playsData.allPlays.forEach(play => {
          if (play.result?.event && play.about?.inning) {
            const isTop = play.about.isTopInning;
            const halfInningKey = `${play.about.inning}-${isTop}`;
            // Reset bases at start of each half-inning
            if (halfInningKey !== lastHalfInning) {
              currentBases = { first: false, second: false, third: false };
              lastHalfInning = halfInningKey;
            }

            // Save score BEFORE this at-bat (for pitch-by-pitch - no spoilers!)
            const scoreBeforeAtBat = {
              away: currentAwayScore,
              home: currentHomeScore
            };

            // Count actual runners who scored on this play by checking runner movements.
            // Don't rely on isScoringPlay - the API can mark it false even when runs score
            // (e.g. runs scoring on wild pitches/passed balls during a strikeout at-bat).
            let totalRunsScored = 0;
            if (play.runners) {
              const scoredRunnerIds = new Set();
              play.runners.forEach(runner => {
                const end = runner.movement?.end;
                const isOut = runner.movement?.isOut;
                const runnerId = runner.details?.runner?.id;
                if (!isOut && (end === 'score' || end === '4B')) {
                  if (runnerId) {
                    scoredRunnerIds.add(runnerId);
                  } else {
                    totalRunsScored++;
                  }
                }
              });
              totalRunsScored += scoredRunnerIds.size;
            }
            const isAnyScoring = totalRunsScored > 0 || (play.about?.isScoringPlay || false);
            if (isAnyScoring && totalRunsScored === 0) totalRunsScored = play.result.rbi || 1;
            // NOTE: Don't update cumulative score here — it's split below between
            // mid-at-bat actions and the at-bat result itself.

            const batter = play.matchup?.batter?.fullName?.split(' ').pop() || 'Unknown';
            const batterFull = play.matchup?.batter?.fullName || 'Unknown';
            const pitcher = play.matchup?.pitcher?.fullName?.split(' ').pop() || 'Unknown';

            // Get outs after this play
            const outs = play.count?.outs ?? 0;

            // Save pre-play base state for pitches (bases at start of at-bat)
            const basesBeforePlay = {
              first: currentBases.first,
              second: currentBases.second,
              third: currentBases.third
            };

            // Parse runners on base after play by tracking each runner's FINAL position.
            // The API can list multiple movements per runner (e.g. batter: null→1B, then 1B→2B).
            // Using vacated/occupied sets gets this wrong because intermediate positions
            // appear both vacated and occupied. Instead, track final position per runner ID.
            const basesAfterPlay = { first: false, second: false, third: false };

            if (play.runners && play.runners.length > 0) {
              const runnerFinalPos = {};
              const basesInvolved = new Set();

              play.runners.forEach(runner => {
                const start = runner.movement?.start;
                const end = runner.movement?.end;
                const isOut = runner.movement?.isOut;
                const runnerId = runner.details?.runner?.id || `anon_${start}_${end}`;

                // Track which bases had a runner leave
                if (start && start !== 'batter') {
                  basesInvolved.add(start);
                }

                // Update this runner's final position (later entries override earlier)
                if (isOut) {
                  runnerFinalPos[runnerId] = null;
                } else if (end === 'score' || end === '4B') {
                  runnerFinalPos[runnerId] = null;
                } else if (end) {
                  runnerFinalPos[runnerId] = end;
                }
              });

              // Preserve runners on bases not involved in this play
              if (currentBases.first && !basesInvolved.has('1B')) basesAfterPlay.first = true;
              if (currentBases.second && !basesInvolved.has('2B')) basesAfterPlay.second = true;
              if (currentBases.third && !basesInvolved.has('3B')) basesAfterPlay.third = true;

              // Place runners at their final positions
              Object.values(runnerFinalPos).forEach(pos => {
                if (pos === '1B') basesAfterPlay.first = true;
                else if (pos === '2B') basesAfterPlay.second = true;
                else if (pos === '3B') basesAfterPlay.third = true;
              });
            } else {
              // No runner data, keep current state (shouldn't happen often)
              basesAfterPlay.first = currentBases.first;
              basesAfterPlay.second = currentBases.second;
              basesAfterPlay.third = currentBases.third;
            }

            // Update current bases for next play
            currentBases = { ...basesAfterPlay };
            const bases = basesAfterPlay;

            // Check for mid-at-bat scoring actions (wild pitches, passed balls, etc.)
            // These are action events in playEvents where runners scored BEFORE the at-bat ended.
            // We create separate play entries for them so the user sees how runs actually scored.
            let midAtBatRuns = 0;
            if (play.playEvents && play.runners && totalRunsScored > 0) {
              play.playEvents.forEach((evt, evtIndex) => {
                if (evt.type === 'action' && !evt.isPitch) {
                  const scoredOnAction = new Set();
                  play.runners.forEach(runner => {
                    if (runner.details?.playIndex === evtIndex &&
                        !runner.movement?.isOut &&
                        (runner.movement?.end === 'score' || runner.movement?.end === '4B')) {
                      const rid = runner.details?.runner?.id;
                      if (rid) scoredOnAction.add(rid);
                    }
                  });

                  if (scoredOnAction.size > 0) {
                    const actionRuns = scoredOnAction.size;
                    midAtBatRuns += actionRuns;
                    if (isTop) currentAwayScore += actionRuns;
                    else currentHomeScore += actionRuns;

                    plays.push({
                      inning: play.about.inning,
                      isTop: isTop,
                      batter: batter,
                      event: evt.details?.event || 'Action',
                      description: evt.details?.description,
                      isScoring: true,
                      isMidAtBatAction: true,
                      awayScore: currentAwayScore,
                      homeScore: currentHomeScore,
                      outs: evt.count?.outs ?? 0,
                      bases: { ...basesBeforePlay }
                    });
                  }
                }
              });
            }

            // Update score for runs on the at-bat result itself (excluding mid-at-bat actions)
            const atBatRuns = totalRunsScored - midAtBatRuns;
            if (atBatRuns > 0) {
              if (isTop) currentAwayScore += atBatRuns;
              else currentHomeScore += atBatRuns;
            }
            const isScoring = atBatRuns > 0;

            // Parse pitch-by-pitch data from playEvents
            let pitchNum = 0;
            if (play.playEvents) {
              play.playEvents.forEach(event => {
                if (event.isPitch) {
                  pitchNum++;
                  const pitchType = event.details?.type?.description || 'Unknown';
                  const speed = event.pitchData?.startSpeed ? Math.round(event.pitchData.startSpeed) : null;
                  const result = event.details?.description || 'Unknown';
                  const balls = event.count?.balls ?? 0;
                  const strikes = event.count?.strikes ?? 0;

                  // Use pre-play base state and pre-at-bat SCORE (no spoilers!)
                  pitches.push({
                    playIndex: playIndex,
                    pitchNum: pitchNum,
                    type: pitchType,
                    speed: speed,
                    result: result,
                    balls: balls,
                    strikes: strikes,
                    batter: batterFull,
                    pitcher: pitcher,
                    inning: play.about.inning,
                    isTop: isTop,
                    outs: event.count?.outs ?? 0,
                    bases: { ...basesBeforePlay },
                    awayScore: scoreBeforeAtBat.away,
                    homeScore: scoreBeforeAtBat.home,
                    isFinal: false
                  });
                }
              });

              // Mark the last pitch of this at-bat as final (the result)
              if (pitches.length > 0 && pitchNum > 0) {
                const lastPitchIdx = pitches.length - 1;
                pitches[lastPitchIdx].isFinal = true;
                pitches[lastPitchIdx].finalResult = play.result.event;
                pitches[lastPitchIdx].outs = outs;
                pitches[lastPitchIdx].bases = bases;
                pitches[lastPitchIdx].awayScore = currentAwayScore;
                pitches[lastPitchIdx].homeScore = currentHomeScore;
              }
            }

            plays.push({
              inning: play.about.inning,
              isTop: isTop,
              batter: batter,
              event: play.result.event,
              isScoring: isScoring,
              awayScore: currentAwayScore,
              homeScore: currentHomeScore,
              outs: outs,
              bases: bases
            });

            playIndex++;
          }
        });
      }

      // Fallback: generate basic plays from innings if API didn't provide them
      if (plays.length === 0 && halfInnings.length > 0) {
        halfInnings.forEach((hi) => {
          if (hi.runs > 0) {
            if (hi.isTop) currentAwayScore += hi.runs;
            else currentHomeScore += hi.runs;
            plays.push({
              inning: hi.inning,
              isTop: hi.isTop,
              batter: "Unknown",
              event: `${hi.runs} run(s) scored`,
              isScoring: true,
              awayScore: currentAwayScore,
              homeScore: currentHomeScore,
              outs: 3,
              bases: {}
            });
          } else {
            plays.push({
              inning: hi.inning,
              isTop: hi.isTop,
              batter: "Unknown",
              event: "Scoreless half-inning",
              isScoring: false,
              awayScore: currentAwayScore,
              homeScore: currentHomeScore,
              outs: 3,
              bases: {}
            });
          }
        });
      }

      return {
        homeTeam: homeTeamInfo,
        awayTeam: awayTeamInfo,
        date: new Date(game.datetime.dateTime).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
        venue: game.venue?.name || 'Unknown Venue',
        halfInnings,
        plays,
        pitches
      };
    };

    // Baseball Diamond Score Bug Component
    const DiamondScoreBug = ({ bases, outs, inning, isTop, awayTeam, homeTeam, awayScore, homeScore, balls, strikes, showCount, celebrating, scoringTeam }) => {
      // bases is an object: { first: bool, second: bool, third: bool }
      const [animationKey, setAnimationKey] = useState(0);

      // Trigger animation when celebrating changes
      useEffect(() => {
        if (celebrating) {
          setAnimationKey(prev => prev + 1);
        }
      }, [celebrating]);

      const BaseShape = ({ occupied, position }) => {
        const positions = {
          first: { right: '8px', top: '50%', transform: 'translateY(-50%) rotate(45deg)' },
          second: { left: '50%', top: '8px', transform: 'translateX(-50%) rotate(45deg)' },
          third: { left: '8px', top: '50%', transform: 'translateY(-50%) rotate(45deg)' },
        };

        return (
          <div
            className={`absolute w-5 h-5 border-2 transition-all duration-300 ${
              occupied
                ? 'bg-amber-400 border-amber-500 shadow-lg shadow-amber-400/50'
                : 'bg-gray-700 border-gray-600'
            }`}
            style={positions[position]}
          />
        );
      };

      return (
        <div
          key={animationKey}
          className={`bg-gray-900/95 rounded-xl border p-3 shadow-xl backdrop-blur-sm transition-all ${
            celebrating
              ? 'dance-celebrate border-amber-500 shadow-amber-500/30'
              : 'border-gray-700'
          }`}
        >
          <div className="flex items-center gap-4">
            {/* Teams and Score */}
            <div className="flex flex-col gap-1 min-w-[80px]">
              <div className={`flex items-center justify-between text-sm ${isTop ? 'text-white' : 'text-gray-400'}`}>
                <span className="font-bold" style={{ color: awayTeam.color }}>{awayTeam.abbreviation}</span>
                <span className={`font-mono font-bold ml-3 ${celebrating && scoringTeam === 'away' ? 'score-celebrate' : ''}`}>{awayScore}</span>
              </div>
              <div className={`flex items-center justify-between text-sm ${!isTop ? 'text-white' : 'text-gray-400'}`}>
                <span className="font-bold" style={{ color: homeTeam.color }}>{homeTeam.abbreviation}</span>
                <span className={`font-mono font-bold ml-3 ${celebrating && scoringTeam === 'home' ? 'score-celebrate' : ''}`}>{homeScore}</span>
              </div>
            </div>

            {/* Diamond */}
            <div className="relative w-16 h-16">
              {/* Diamond outline */}
              <div className="absolute inset-2 border-2 border-gray-600 rotate-45 bg-gray-800/50"></div>
              {/* Home plate */}
              <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-gray-500 rotate-45"></div>
              {/* Bases */}
              <BaseShape position="first" occupied={bases?.first} />
              <BaseShape position="second" occupied={bases?.second} />
              <BaseShape position="third" occupied={bases?.third} />
            </div>

            {/* Inning, Outs, and Count */}
            <div className="flex flex-col items-center gap-1">
              <div className="text-amber-400 font-bold text-sm">
                {isTop ? '▲' : '▼'} {inning}
              </div>

              {/* Ball-Strike Count */}
              {showCount && (
                <div className="flex items-center gap-2 text-xs mb-1">
                  <div className="flex items-center gap-1">
                    <span className="text-gray-500">B</span>
                    <div className="flex gap-0.5">
                      {[0, 1, 2, 3].map(i => (
                        <div
                          key={i}
                          className={`w-2 h-2 rounded-full transition-all ${
                            i < (balls || 0) ? 'bg-green-500' : 'bg-gray-600'
                          }`}
                        />
                      ))}
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    <span className="text-gray-500">S</span>
                    <div className="flex gap-0.5">
                      {[0, 1, 2].map(i => (
                        <div
                          key={i}
                          className={`w-2 h-2 rounded-full transition-all ${
                            i < (strikes || 0) ? 'bg-yellow-500' : 'bg-gray-600'
                          }`}
                        />
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* Outs */}
              <div className="flex items-center gap-1">
                <span className="text-gray-500 text-xs">O</span>
                <div className="flex gap-0.5">
                  {[0, 1, 2].map(i => (
                    <div
                      key={i}
                      className={`w-2 h-2 rounded-full transition-all ${
                        i < (outs || 0) ? 'bg-red-500' : 'bg-gray-600'
                      }`}
                    />
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // UI Components
    const FlipDigit = ({ value, size = "large" }) => {
      const [displayValue, setDisplayValue] = useState(value);
      const [isFlipping, setIsFlipping] = useState(false);
      const prevValue = useRef(value);

      useEffect(() => {
        if (prevValue.current !== value) {
          setIsFlipping(true);
          const timer = setTimeout(() => {
            setDisplayValue(value);
            setIsFlipping(false);
          }, 150);
          prevValue.current = value;
          return () => clearTimeout(timer);
        }
      }, [value]);

      const sizeClasses = size === "large" ? "w-14 h-20 text-5xl" : size === "medium" ? "w-10 h-14 text-3xl" : "w-7 h-10 text-xl";

      return (
        <div
          className={`${sizeClasses} scoreboard-digit rounded flex items-center justify-center font-mono font-bold text-amber-400 shadow-lg`}
          style={{
            transform: isFlipping ? 'rotateX(90deg)' : 'rotateX(0deg)',
            transition: 'transform 0.15s ease-in-out',
            textShadow: '0 0 10px rgba(251, 191, 36, 0.5)'
          }}
        >
          {displayValue}
        </div>
      );
    };

    const ScoreDisplay = ({ score, size = "large" }) => {
      const digits = String(score).padStart(2, ' ').split('');
      return (
        <div className="flex gap-1">
          {digits.map((digit, i) => (
            <FlipDigit key={i} value={digit === ' ' ? '' : digit} size={size} />
          ))}
        </div>
      );
    };

    // Half-inning cell for scoreboard
    const HalfInningCell = ({ topRuns, bottomRuns, topRevealed, bottomRevealed, isCurrentTop, isCurrentBottom }) => (
      <div className="flex flex-col border-r border-gray-700">
        <div className={`w-10 h-5 flex items-center justify-center font-mono text-sm transition-all duration-300 border-b border-gray-800 ${isCurrentTop ? 'bg-amber-900/40' : ''}`}>
          {topRevealed ? (
            <span className={`${topRuns > 0 ? 'text-amber-400 font-bold' : 'text-gray-500'}`} style={topRuns > 0 ? { textShadow: '0 0 6px rgba(251, 191, 36, 0.4)' } : {}}>
              {topRuns}
            </span>
          ) : (
            <span className="text-gray-700">—</span>
          )}
        </div>
        <div className={`w-10 h-5 flex items-center justify-center font-mono text-sm transition-all duration-300 ${isCurrentBottom ? 'bg-amber-900/40' : ''}`}>
          {bottomRevealed ? (
            <span className={`${bottomRuns > 0 ? 'text-amber-400 font-bold' : 'text-gray-500'}`} style={bottomRuns > 0 ? { textShadow: '0 0 6px rgba(251, 191, 36, 0.4)' } : {}}>
              {bottomRuns}
            </span>
          ) : (
            <span className="text-gray-700">—</span>
          )}
        </div>
      </div>
    );

    const PlayCard = ({ play, homeTeam, awayTeam, isNew, showNonScoring }) => {
      const team = play.isTop ? awayTeam : homeTeam;
      const halfLabel = play.isTop ? "▲" : "▼";

      return (
        <div
          className={`p-3 rounded-lg border-l-4 mb-2 transition-all duration-500 ${
            isNew ? 'bg-amber-900/30 animate-pulse' :
            play.isScoring ? 'bg-gray-800/70' : 'bg-gray-800/30'
          }`}
          style={{ borderLeftColor: play.isScoring ? team.color : '#444' }}
        >
          <div className="flex justify-between items-start">
            <div className="flex-1">
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{halfLabel} {play.inning}{getOrdinalSuffix(play.inning)}</span>
                {play.isScoring && <span className="text-xs bg-green-900/50 text-green-400 px-2 py-0.5 rounded">SCORING</span>}
              </div>
              <p className={`mt-1 ${play.isScoring ? 'text-white font-medium' : 'text-gray-400'}`}>
                {play.isMidAtBatAction ? (
                  <span>{play.description || play.event}</span>
                ) : (
                  <span><span className="font-semibold">{play.batter}</span>: {play.event}</span>
                )}
              </p>
            </div>
            <div className="text-right ml-3">
              <div className="text-xs text-gray-500">{awayTeam.abbreviation} - {homeTeam.abbreviation}</div>
              <div className={`font-mono font-bold ${play.isScoring ? 'text-amber-400' : 'text-gray-500'}`}>
                {play.awayScore} - {play.homeScore}
              </div>
            </div>
          </div>
        </div>
      );
    };

    function getOrdinalSuffix(n) {
      const s = ["th", "st", "nd", "rd"];
      const v = n % 100;
      return s[(v - 20) % 10] || s[v] || s[0];
    }

    const SpeedButton = ({ speed, currentSpeed, onClick, label }) => (
      <button
        onClick={() => onClick(speed)}
        className={`px-4 py-2 rounded-lg font-medium transition-all ${currentSpeed === speed ? 'bg-amber-600 text-white shadow-lg' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}
      >
        {label}
      </button>
    );

    const GameCard = ({ game, onSelect }) => {
      const homeTeam = MLB_TEAMS[game.teams.home.team.id] || { abbreviation: game.teams.home.team.abbreviation, color: "#333" };
      const awayTeam = MLB_TEAMS[game.teams.away.team.id] || { abbreviation: game.teams.away.team.abbreviation, color: "#666" };
      const isFinal = game.status.abstractGameState === "Final";

      return (
        <button
          onClick={() => onSelect(game)}
          disabled={!isFinal}
          className={`w-full p-4 rounded-xl border transition-all ${isFinal ? 'bg-gray-800/50 border-gray-700 hover:border-amber-600 hover:bg-gray-800 cursor-pointer' : 'bg-gray-900/50 border-gray-800 opacity-50 cursor-not-allowed'}`}
        >
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold" style={{ backgroundColor: awayTeam.color }}>
                {awayTeam.abbreviation?.substring(0, 2) || 'AW'}
              </div>
              <span className="text-gray-500 text-xl">@</span>
              <div className="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold" style={{ backgroundColor: homeTeam.color }}>
                {homeTeam.abbreviation?.substring(0, 2) || 'HM'}
              </div>
            </div>
            <div className="text-right">
              <div className="text-white font-semibold text-lg">
                {awayTeam.abbreviation || game.teams.away.team.abbreviation} @ {homeTeam.abbreviation || game.teams.home.team.abbreviation}
              </div>
              <div className={`text-sm font-medium ${isFinal ? 'text-green-400' : 'text-yellow-400'}`}>
                {isFinal ? '✓ Final - Ready to replay' : game.status.detailedState}
              </div>
            </div>
          </div>
        </button>
      );
    };

    // Main App
    function GameReplayApp() {
      const [view, setView] = useState('loading'); // Start with loading to fetch random game
      const [selectedDate, setSelectedDate] = useState(() => {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        return yesterday.toISOString().split('T')[0];
      });
      const [games, setGames] = useState([]);
      const [isLoadingGames, setIsLoadingGames] = useState(false);
      const [gameData, setGameData] = useState(null);
      const [loadingMessage, setLoadingMessage] = useState('Loading an exciting game...');
      const [mode, setMode] = useState('inning'); // 'inning', 'play', or 'pitch'
      const [isPlaying, setIsPlaying] = useState(false);
      const [speed, setSpeed] = useState(2000);
      const [currentStep, setCurrentStep] = useState(0);
      const [scoringPlaysOnly, setScoringPlaysOnly] = useState(false);
      const [celebrating, setCelebrating] = useState(false);
      const [scoringTeam, setScoringTeam] = useState(null);
      const prevStepRef = useRef(0);
      const hasLoadedRandomGame = useRef(false);

      // Auto-load a random exciting game on mount
      useEffect(() => {
        if (hasLoadedRandomGame.current) return;
        hasLoadedRandomGame.current = true;

        const loadRandomGame = async () => {
          setLoadingMessage('Finding an exciting game...');
          const gameResult = await fetchRandomExcitingGame();

          if (gameResult) {
            setLoadingMessage('Parsing play-by-play data...');
            const parsed = parseGameData(gameResult.linescore, gameResult.plays);
            if (parsed && parsed.halfInnings.length > 0) {
              setGameData(parsed);
              setView('warning');
              return;
            }
          }

          // Fallback to search view if no game could be loaded
          setLoadingMessage('Could not load game, showing search...');
          setTimeout(() => setView('search'), 1000);
        };

        loadRandomGame();
      }, []);

      // Check if current event is a home run (big event)
      const isHomeRun = (eventText) => {
        if (!eventText) return false;
        const text = eventText.toLowerCase();
        return text.includes('home run') || text.includes('homer') || text.includes('grand slam');
      };

      // Detect big events and trigger celebrations
      useEffect(() => {
        if (currentStep > prevStepRef.current && gameData) {
          let currentEvent = null;
          let isTop = true;

          if (mode === 'play') {
            const plays = scoringPlaysOnly
              ? gameData.plays.filter(p => p.isScoring)
              : gameData.plays;
            currentEvent = plays[currentStep - 1]?.event;
            isTop = plays[currentStep - 1]?.isTop;
          } else if (mode === 'pitch' && gameData.pitches) {
            const pitch = gameData.pitches[currentStep - 1];
            if (pitch?.isFinal || pitch?.isResult) {
              currentEvent = pitch.finalResult || pitch.result;
              isTop = pitch.isTop;
            }
          }

          if (isHomeRun(currentEvent)) {
            setCelebrating(true);
            setScoringTeam(isTop ? 'away' : 'home');
            setTimeout(() => {
              setCelebrating(false);
              setScoringTeam(null);
            }, 2500);
          }
        }
        prevStepRef.current = currentStep;
      }, [currentStep, mode, gameData, scoringPlaysOnly]);

      // Calculate max steps based on mode
      const getMaxSteps = () => {
        if (!gameData) return 0;
        if (mode === 'inning') {
          return gameData.halfInnings.length;
        } else if (mode === 'pitch') {
          return gameData.pitches?.length || 0;
        } else {
          const plays = scoringPlaysOnly
            ? gameData.plays.filter(p => p.isScoring)
            : gameData.plays;
          return plays.length;
        }
      };

      const maxSteps = getMaxSteps();

      // Get filtered plays for play-by-play mode
      const getFilteredPlays = () => {
        if (!gameData) return [];
        return scoringPlaysOnly
          ? gameData.plays.filter(p => p.isScoring)
          : gameData.plays;
      };

      useEffect(() => {
        if (view !== 'search') return;
        const loadGames = async () => {
          setIsLoadingGames(true);
          const fetchedGames = await fetchGamesForDate(selectedDate);
          setGames(fetchedGames);
          setIsLoadingGames(false);
        };
        loadGames();
      }, [selectedDate, view]);

      // Calculate scores based on current step
      const getCurrentScores = useCallback(() => {
        if (!gameData) return { away: 0, home: 0 };

        if (mode === 'inning') {
          let away = 0, home = 0;
          for (let i = 0; i < currentStep; i++) {
            const hi = gameData.halfInnings[i];
            if (hi.isTop) away += hi.runs;
            else home += hi.runs;
          }
          return { away, home };
        } else if (mode === 'pitch') {
          if (currentStep === 0 || !gameData.pitches) return { away: 0, home: 0 };
          const lastPitch = gameData.pitches[currentStep - 1];
          return { away: lastPitch?.awayScore || 0, home: lastPitch?.homeScore || 0 };
        } else {
          const plays = getFilteredPlays();
          if (currentStep === 0) return { away: 0, home: 0 };
          const lastPlay = plays[currentStep - 1];
          return { away: lastPlay?.awayScore || 0, home: lastPlay?.homeScore || 0 };
        }
      }, [mode, currentStep, gameData, scoringPlaysOnly]);

      const scores = getCurrentScores();

      // Get current half-inning info for display
      const getCurrentHalfInning = () => {
        if (!gameData || currentStep === 0) return null;
        if (mode === 'inning') {
          return gameData.halfInnings[currentStep - 1];
        } else if (mode === 'pitch') {
          return gameData.pitches?.[currentStep - 1];
        } else {
          const plays = getFilteredPlays();
          return plays[currentStep - 1];
        }
      };

      const currentHalfInning = getCurrentHalfInning();

      useEffect(() => {
        if (!isPlaying || currentStep >= maxSteps) {
          if (currentStep >= maxSteps) setIsPlaying(false);
          return;
        }
        const timer = setTimeout(() => setCurrentStep(prev => prev + 1), speed);
        return () => clearTimeout(timer);
      }, [isPlaying, currentStep, speed, maxSteps]);

      const handleSelectGame = async (game) => {
        setView('loading');
        setLoadingMessage('Loading game data...');
        const details = await fetchGameDetails(game.gamePk);
        if (details) {
          const parsed = parseGameData(details.linescore, details.plays);
          if (parsed && parsed.halfInnings.length > 0) {
            setGameData(parsed);
            setView('warning');
            return;
          }
        }
        // Fallback: try to load a random exciting game
        setLoadingMessage('Game unavailable, finding another exciting game...');
        const fallback = await fetchRandomExcitingGame();
        if (fallback) {
          const parsed = parseGameData(fallback.linescore, fallback.plays);
          if (parsed && parsed.halfInnings.length > 0) {
            setGameData(parsed);
            setView('warning');
            return;
          }
        }
        // If all else fails, go back to search
        setView('search');
      };

      const handleLoadRandomGame = async () => {
        setView('loading');
        setLoadingMessage('Finding an exciting game...');
        const gameResult = await fetchRandomExcitingGame();
        if (gameResult) {
          const parsed = parseGameData(gameResult.linescore, gameResult.plays);
          if (parsed && parsed.halfInnings.length > 0) {
            setGameData(parsed);
            setView('warning');
            return;
          }
        }
        // Fallback to search if nothing works
        setView('search');
      };

      const handleStartReplay = () => {
        setCurrentStep(0);
        setIsPlaying(false);
        setView('replay');
      };

      const handleBack = () => {
        setView('search');
        setGameData(null);
        setCurrentStep(0);
        setIsPlaying(false);
      };

      const handlePlayPause = () => {
        if (currentStep >= maxSteps) setCurrentStep(0);
        setIsPlaying(!isPlaying);
      };

      const handleReset = () => {
        setIsPlaying(false);
        setCurrentStep(0);
      };

      const handleModeChange = (newMode) => {
        if (newMode === mode) return;

        setIsPlaying(false);

        // Map current position to the new mode
        if (currentStep === 0) {
          setMode(newMode);
          return;
        }

        // Get current position info based on current mode
        let currentInning, currentIsTop;
        if (mode === 'inning') {
          const hi = gameData.halfInnings[currentStep - 1];
          currentInning = hi?.inning;
          currentIsTop = hi?.isTop;
        } else if (mode === 'play') {
          const play = getFilteredPlays()[currentStep - 1];
          currentInning = play?.inning;
          currentIsTop = play?.isTop;
        } else if (mode === 'pitch') {
          const pitch = gameData.pitches?.[currentStep - 1];
          currentInning = pitch?.inning;
          currentIsTop = pitch?.isTop;
        }

        // Map to new mode
        if (newMode === 'inning') {
          const halfInningIndex = gameData.halfInnings.findIndex(
            hi => hi.inning === currentInning && hi.isTop === currentIsTop
          );
          setCurrentStep(halfInningIndex !== -1 ? halfInningIndex + 1 : 0);
        } else if (newMode === 'play') {
          const targetPlays = getFilteredPlays();
          let playIndex = 0;
          for (let i = 0; i < targetPlays.length; i++) {
            if (targetPlays[i].inning < currentInning ||
                (targetPlays[i].inning === currentInning &&
                 (currentIsTop ? targetPlays[i].isTop : true))) {
              playIndex = i + 1;
            }
          }
          setCurrentStep(playIndex);
        } else if (newMode === 'pitch') {
          // Find first pitch in or before current position
          if (gameData.pitches) {
            let pitchIndex = 0;
            for (let i = 0; i < gameData.pitches.length; i++) {
              const p = gameData.pitches[i];
              if (p.inning < currentInning ||
                  (p.inning === currentInning && (currentIsTop ? p.isTop : true))) {
                pitchIndex = i + 1;
              }
            }
            setCurrentStep(Math.min(pitchIndex, gameData.pitches.length));
          }
        }

        setMode(newMode);
      };

      // Build innings grid data for display
      // Only show 9 innings initially, then reveal extras only when we've revealed data from them
      const getInningsGrid = () => {
        if (!gameData) return [];

        // Find the highest inning that has been revealed so far
        let highestRevealedInning = 0;
        for (let i = 0; i < currentStep; i++) {
          const hi = gameData.halfInnings[i];
          if (hi && hi.inning > highestRevealedInning) {
            highestRevealedInning = hi.inning;
          }
        }

        // Show at least 9 innings, but only show extras once we've revealed them
        // This prevents spoiling that the game goes to extras before it happens
        const baseInnings = 9;
        const inningsToShow = Math.max(baseInnings, highestRevealedInning);

        const grid = [];
        for (let i = 1; i <= inningsToShow; i++) {
          const topHalf = gameData.halfInnings.find(hi => hi.inning === i && hi.isTop);
          const bottomHalf = gameData.halfInnings.find(hi => hi.inning === i && !hi.isTop);

          // Determine which half-innings are revealed based on currentStep
          const topIndex = gameData.halfInnings.findIndex(hi => hi.inning === i && hi.isTop);
          const bottomIndex = gameData.halfInnings.findIndex(hi => hi.inning === i && !hi.isTop);

          grid.push({
            inning: i,
            topRuns: topHalf?.runs || 0,
            bottomRuns: bottomHalf?.runs || 0,
            topRevealed: topIndex !== -1 && topIndex < currentStep,
            bottomRevealed: bottomIndex !== -1 && bottomIndex < currentStep,
            isCurrentTop: topIndex === currentStep - 1,
            isCurrentBottom: bottomIndex === currentStep - 1
          });
        }

        return grid;
      };

      // Search View
      if (view === 'search') {
        return (
          <div className="min-h-screen bg-gray-950 p-4 md:p-8">
            <div className="max-w-2xl mx-auto">
              <div className="text-center mb-8">
                <div className="text-7xl mb-4">⚾</div>
                <h1 className="text-4xl font-bold text-white mb-2">Game Replay</h1>
                <p className="text-gray-400 text-lg">Experience the game without spoilers</p>
              </div>

              <div className="bg-gray-900 rounded-2xl p-6 border border-gray-800 mb-6">
                <label className="block text-gray-400 text-sm mb-2">Select Date</label>
                <input
                  type="date"
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white text-lg focus:outline-none focus:border-amber-600 transition-colors"
                />
              </div>

              <div className="space-y-3">
                {isLoadingGames ? (
                  <div className="text-center py-12">
                    <div className="animate-spin w-10 h-10 border-3 border-amber-600 border-t-transparent rounded-full mx-auto mb-4"></div>
                    <p className="text-gray-400">Loading games from MLB...</p>
                  </div>
                ) : games.length > 0 ? (
                  <>
                    <p className="text-gray-400 text-sm mb-4">{games.filter(g => g.status.abstractGameState === "Final").length} completed game(s) available</p>
                    {games.map((game) => (
                      <GameCard key={game.gamePk} game={game} onSelect={handleSelectGame} />
                    ))}
                  </>
                ) : (
                  <div className="text-center py-12 bg-gray-900/50 rounded-xl border border-gray-800">
                    <div className="text-4xl mb-4">📅</div>
                    <p className="text-gray-400 mb-2">No games found for this date</p>
                    <p className="text-gray-500 text-sm">Try selecting a date during baseball season (April - October)</p>
                  </div>
                )}
              </div>

              <div className="mt-8 pt-6 border-t border-gray-800">
                <button
                  onClick={handleLoadRandomGame}

                      <svg className="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    ) : (
                      <svg className="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    )}
                  </button>
                  <button onClick={() => currentStep < maxSteps && setCurrentStep(prev => prev + 1)} disabled={currentStep >= maxSteps} className="p-3 bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed rounded-xl transition-all">
                    <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                  </button>
                  <button onClick={() => { setIsPlaying(false); setCurrentStep(maxSteps); }} className="p-3 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all" title="Skip to end">
                    <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
                  </button>
                </div>

              </div>

              <div className="text-center mt-6 text-gray-600 text-sm">
                ⚾ Game Replay • Experience the drama without spoilers
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.render(<GameReplayApp />, document.getElementById('root'));
  </script>
</body>
</html>
